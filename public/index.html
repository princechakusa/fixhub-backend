<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FixHub | Enterprise Maintenance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ========== FULL ORIGINAL STYLES (condensed for brevity – keep all your CSS) ========== */
    /* Since you have the full CSS from earlier, I'm placing a placeholder.
       In production, you can copy your exact <style> block from the original HTML.
       For now, I'll include a minimal working version – but you should replace with the complete styles. */
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#083332;color:#1a2332;height:100vh;overflow:hidden}
    :root{--teal-800:#083332;--teal-700:#0A4240;--teal-600:#0c5250;--teal-500:#0f6b66;--teal-400:#14b8a6;--bg:#f4f6f8;--bg-card:#fff;--border:#e2e6ea;--text-primary:#1a2332;--text-secondary:#4a5568;--text-muted:#8492a6;--sb-w:260px;--topbar:60px;--r:10px;--tr:.2s}
    /* Sidebar, topbar, tables, modals – same as original. For space, I'll include a compact version.
       You must replace this with your full CSS from the original HTML to get the exact look. */
    #sb{width:var(--sb-w);height:100vh;background:#f8f9fa;border-right:1px solid #e9ecef;position:fixed;left:0;top:0;transition:width var(--tr);z-index:200}
    #main{margin-left:var(--sb-w);height:100vh;display:flex;flex-direction:column}
    .topbar{height:var(--topbar);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px}
    #content{flex:1;overflow-y:auto;padding:24px}
    .view{display:none}
    .view.active{display:block}
    /* Add all other styles (stat cards, tables, pills, modals) from original */
  </style>
</head>
<body>
<div id="login-screen" style="position:fixed;inset:0;background:var(--teal-800);display:flex;align-items:center;justify-content:center;z-index:9999">
  <div class="login-card" style="background:#fff;border-radius:18px;width:380px;padding:2rem">
    <h2>FixHub Login</h2>
    <div id="login-error" style="color:red;display:none"></div>
    <input type="text" id="login-name" placeholder="Full name" style="width:100%;padding:10px;margin:10px 0">
    <input type="password" id="login-password" placeholder="Password" style="width:100%;padding:10px;margin:10px 0">
    <button id="login-btn" style="background:#0f6b66;color:#fff;border:none;padding:10px;width:100%">Sign In</button>
  </div>
</div>

<div id="sb" style="display:none">...</div> <!-- Sidebar will be generated by JS -->
<div id="main" style="display:none">
  <div class="topbar"><div class="topbar-title">FixHub</div><div id="user-name"></div></div>
  <div id="content"></div>
</div>

<script>
  // API configuration
  const API_BASE = 'https://fixhub-db.onrender.com/api';
  let authToken = localStorage.getItem('token');
  let currentUser = null;

  // Helper fetch
  async function apiFetch(endpoint, options = {}) {
    const headers = {
      'Content-Type': 'application/json',
      ...(authToken ? { 'Authorization': `Bearer ${authToken}` } : {})
    };
    const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ message: 'Request failed' }));
      throw new Error(err.message);
    }
    return res.json();
  }

  // Login
  document.getElementById('login-btn').onclick = async () => {
    const name = document.getElementById('login-name').value;
    const password = document.getElementById('login-password').value;
    try {
      const data = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ name, password }) });
      authToken = data.token;
      currentUser = data;
      localStorage.setItem('token', authToken);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('sb').style.display = 'block';
      document.getElementById('main').style.display = 'flex';
      loadDashboard();
    } catch (err) {
      const errDiv = document.getElementById('login-error');
      errDiv.innerText = err.message;
      errDiv.style.display = 'block';
    }
  };

  async function loadDashboard() {
    // Fetch tickets and display basic stats
    const tickets = await apiFetch('/tickets');
    const content = document.getElementById('content');
    content.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px">
        <div class="stat-card">Active: ${tickets.filter(t=>t.status!=='resolved').length}</div>
        <div class="stat-card">Total: ${tickets.length}</div>
        <div class="stat-card">Resolved: ${tickets.filter(t=>t.status==='resolved').length}</div>
      </div>
      <h2>Recent Tickets</h2>
      <div id="recent-tickets"></div>
      <button id="new-ticket-btn">New Ticket</button>
    `;
    const recentDiv = document.getElementById('recent-tickets');
    recentDiv.innerHTML = tickets.slice(0,5).map(t => `<div>${t.id} - ${t.title} (${t.status})</div>`).join('');
    document.getElementById('new-ticket-btn').onclick = () => alert('Will implement ticket modal');
  }

  // Auto-login if token exists
  if (authToken) {
    apiFetch('/auth/me').then(user => {
      currentUser = user;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('sb').style.display = 'block';
      document.getElementById('main').style.display = 'flex';
      loadDashboard();
    }).catch(() => { localStorage.removeItem('token'); });
  }
</script>
</body>
</html>
